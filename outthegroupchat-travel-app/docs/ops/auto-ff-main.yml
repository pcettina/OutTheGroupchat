name: Auto fast-forward main from latest green nightly

# Durable fix for the recurring "frozen main" nightly stall.
# The nightly-otgc-build agent produces green `nightly/YYYY-MM-DD` branches but
# CANNOT merge to `main` itself (by design). Without a human ff-merge, `main`
# freezes and the escalation guard trips every subsequent night (this happened
# for 6+ consecutive nights, 2026-07-01 .. 2026-07-09). This Action lands the
# newest clean linear-ancestor nightly onto `main` every morning, so `main` is
# never more than one nightly behind and the guard never trips.
#
# Safety: only fast-forwards when the latest nightly is a strict linear
# descendant of `main` (no merge commit, no divergence). If histories have
# diverged, it does nothing and logs — a human then resolves manually.
#
# NOTE: this file only takes effect once it is on the default branch (`main`).
# The bootstrap is intentional: the one ff-merge the human must do to unblock
# the current backlog is the same merge that installs this automation.

on:
  schedule:
    - cron: "0 13 * * *"   # 08:00 ET / 13:00 UTC — after the 10 PM nightly completes
  workflow_dispatch:        # allow a manual run from the Actions tab

permissions:
  contents: write

concurrency:
  group: auto-ff-main
  cancel-in-progress: false

jobs:
  ff-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fast-forward main to newest linear-ancestor nightly
        run: |
          set -euo pipefail
          git config user.name  "otgc-auto-ff"
          git config user.email "actions@github.com"
          git fetch origin --prune

          latest=$(git branch -r | grep 'origin/nightly/' | sed 's/^[[:space:]]*//' | sort | tail -1)
          if [ -z "$latest" ]; then
            echo "No origin/nightly/* branches found; nothing to do."
            exit 0
          fi
          echo "Latest nightly branch: $latest"

          ahead=$(git rev-list --count "origin/main..$latest")
          if git merge-base --is-ancestor origin/main "$latest" && [ "$ahead" -gt 0 ]; then
            echo "main is $ahead commit(s) behind $latest and it is a clean linear ancestor — fast-forwarding."
            git checkout main
            git merge --ff-only "$latest"
            git push origin main
            echo "main fast-forwarded to $latest."
          else
            echo "No clean linear fast-forward available (ahead=$ahead); skipping. A human should reconcile manually."
          fi
