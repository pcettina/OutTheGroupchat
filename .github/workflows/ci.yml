name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: outthegroupchat-travel-app

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/otgc_test' }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-test-secret-do-not-use-in-production' }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL || 'http://localhost:3000' }}
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: outthegroupchat-travel-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run Vitest unit tests
        run: npx vitest run --run

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: outthegroupchat-travel-app

      # The Playwright webServer (playwright.config.ts) launches `npm run start`,
      # which serves the production build from `.next`. That build must exist
      # before the E2E step runs, or `next start` exits immediately and every
      # authenticated-flow spec fails on server start. Build here so the verified
      # e2e/authenticated-flow.spec.ts suite (16/16 local) actually runs in CI.
      - name: Build production bundle (for E2E webServer)
        if: hashFiles('playwright.config.ts') != ''
        run: npm run build
        env:
          CI: 'true'

      - name: Run Playwright E2E tests
        if: hashFiles('playwright.config.ts') != ''
        run: npx playwright test
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: 'http://localhost:3000'

      - name: Upload Playwright test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: outthegroupchat-travel-app/playwright-report/
          retention-days: 7

      - name: Upload Vitest test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results
          path: outthegroupchat-travel-app/test-results/
          retention-days: 7
